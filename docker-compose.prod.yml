x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  pos:
    name: mahalakshmi-pos-network
    driver: bridge

services:
  postgres:
    profiles: ["infra"]
    image: postgres:17-alpine
    init: true
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pos
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meat_billing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR:-/home/ubuntu/pos-postgress/data}:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  rustfs:
    profiles: ["infra"]
    image: rustfs/rustfs:latest
    init: true
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pos
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:?Set RUSTFS_SERVER_DOMAINS}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${RUSTFS_DATA_DIR:-/home/ubuntu/rustfs/data}:/data
    command:
      - --address
      - :9000
      - --console-enable
      - --server-domains
      - ${RUSTFS_SERVER_DOMAINS:?Set RUSTFS_SERVER_DOMAINS}
      - --access-key
      - ${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}
      - /data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/ | grep -qE '^(200|403|404)$'",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/mahalakshmi-pos-backend:${BACKEND_IMAGE_TAG:-${IMAGE_TAG:-latest}}
    init: true
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pos
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Meat Billing System API}
      SECRET_KEY: ${BACKEND_SECRET_KEY:?Set BACKEND_SECRET_KEY}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meat_billing}}
      PRODUCTION: ${BACKEND_PRODUCTION:-True}
      ALLOWED_HOSTS: ${BACKEND_ALLOWED_HOSTS:?Set BACKEND_ALLOWED_HOSTS}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-*}
      RUSTFS_ENDPOINT_URL: ${BACKEND_RUSTFS_ENDPOINT_URL:-http://rustfs:9000}
      RUSTFS_ACCESS_KEY_ID: ${BACKEND_RUSTFS_ACCESS_KEY_ID:-${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}}
      RUSTFS_SECRET_ACCESS_KEY: ${BACKEND_RUSTFS_SECRET_ACCESS_KEY:-${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}}
      RUSTFS_BUCKET_NAME: ${BACKEND_RUSTFS_BUCKET_NAME:-pos-mlb-items}
      RUSTFS_REGION_NAME: ${BACKEND_RUSTFS_REGION_NAME:-us-east-1}
      TRUSTED_PROXIES: ${BACKEND_TRUSTED_PROXIES:-}
      TRUST_X_FORWARDED_PROTO: ${BACKEND_TRUST_X_FORWARDED_PROTO:-True}
      WEB_CONCURRENCY: ${BACKEND_WEB_CONCURRENCY:-1}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/mahalakshmi-pos-caddy:${CADDY_IMAGE_TAG:-${IMAGE_TAG:-latest}}
    init: true
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pos
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?Set CADDY_ACME_EMAIL}
      CADDY_PUBLIC_HOST: ${CADDY_PUBLIC_HOST:?Set CADDY_PUBLIC_HOST}
      CADDY_DUCKDNS_HOST: ${CADDY_DUCKDNS_HOST:-}
      DUCKDNS_API_TOKEN: ${DUCKDNS_API_TOKEN:-}
      CADDY_UPSTREAM: ${CADDY_UPSTREAM:-backend:8000}
      CADDY_RATE_LIMIT_EVENTS: ${CADDY_RATE_LIMIT_EVENTS:-120}
      CADDY_RATE_LIMIT_WINDOW: ${CADDY_RATE_LIMIT_WINDOW:-1m}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile && pidof caddy >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy-data:
  caddy-config:
