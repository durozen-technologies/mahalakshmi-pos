services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+asyncpg://postgres:root@host.docker.internal:5432/meat_billing}
      PRODUCTION: ${BACKEND_PRODUCTION:-False}
      ALLOWED_HOSTS: ${BACKEND_ALLOWED_HOSTS:-["*"]}
      RUSTFS_ENDPOINT_URL: ${BACKEND_RUSTFS_ENDPOINT_URL:-http://host.docker.internal:9000}
      WEB_CONCURRENCY: ${BACKEND_WEB_CONCURRENCY:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    build:
      context: ./caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?Set CADDY_ACME_EMAIL}
      DUCKDNS_API_TOKEN: ${DUCKDNS_API_TOKEN:?Set DUCKDNS_API_TOKEN}
      CADDY_UPSTREAM: ${CADDY_UPSTREAM:-backend:8000}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile && pidof caddy >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy-data:
  caddy-config:
