name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  BACKEND_IMAGE: mahalakshmi-pos-backend
  CADDY_IMAGE: mahalakshmi-pos-caddy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push caddy
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          file: ./caddy/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create production .env
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RUSTFS_ACCESS_KEY: ${{ secrets.RUSTFS_ACCESS_KEY }}
          RUSTFS_SECRET_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
          RUSTFS_SERVER_DOMAINS: ${{ secrets.RUSTFS_SERVER_DOMAINS }}
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          BACKEND_ALLOWED_HOSTS: ${{ secrets.BACKEND_ALLOWED_HOSTS }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          DUCKDNS_API_TOKEN: ${{ secrets.DUCKDNS_API_TOKEN }}
          BACKEND_RUSTFS_BUCKET_NAME: ${{ secrets.BACKEND_RUSTFS_BUCKET_NAME }}
        run: |
          cat > .env.deploy <<EOF
          DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
          IMAGE_TAG=${IMAGE_TAG}
          POSTGRES_DATA_DIR=/home/ubuntu/pos-postgress/data
          RUSTFS_DATA_DIR=/home/ubuntu/rustfs/data
          POSTGRES_DB=${POSTGRES_DB:-meat_billing}
          POSTGRES_USER=${POSTGRES_USER:-postgres}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
          RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
          RUSTFS_SERVER_DOMAINS=${RUSTFS_SERVER_DOMAINS}
          BACKEND_SECRET_KEY=${BACKEND_SECRET_KEY}
          BACKEND_PRODUCTION=True
          BACKEND_ALLOWED_HOSTS=${BACKEND_ALLOWED_HOSTS:-["pos-mlb.duckdns.org"]}
          BACKEND_RUSTFS_BUCKET_NAME=${BACKEND_RUSTFS_BUCKET_NAME:-pos-mlb-items}
          CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
          DUCKDNS_API_TOKEN=${DUCKDNS_API_TOKEN}
          CADDY_UPSTREAM=backend:8000
          EOF

      - name: Copy deploy artifacts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.deploy,scripts/deploy-prod.sh,scripts/pos-logs.sh"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Run production deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            mv -f .env.deploy .env
            chmod +x scripts/deploy-prod.sh scripts/pos-logs.sh
            export DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}"
            export DOCKERHUB_TOKEN="${DOCKERHUB_TOKEN}"
            bash scripts/deploy-prod.sh
