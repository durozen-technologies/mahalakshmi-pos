services:
  - type: web
    name: billing-system-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install . gunicorn uvicorn-worker
    startCommand: python -m gunicorn main:app --worker-class uvicorn_worker.UvicornWorker --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-1} --timeout 120 --graceful-timeout 30 --keep-alive 5 --access-logfile - --error-logfile - --log-level info --max-requests 1000 --max-requests-jitter 50
    healthCheckPath: /api/v1/health
    envVars:
      - key: production
        value: "True"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: WEB_CONCURRENCY
        value: "2"
