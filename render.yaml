services:
  - type: web
    name: billing-system-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: gunicorn -c gunicorn.conf.py main:app
    healthCheckPath: /api/v1/health
    envVars:
      - key: production
        value: "True"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: WEB_CONCURRENCY
        value: "2"
